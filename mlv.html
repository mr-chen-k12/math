<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Master: The Lit Meter</title>
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #50E3C2;
            --accent: #FF6B6B;
            --bg: #F0F4F8;
            --text: #333;
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --correct: #27ae60;
            --wrong: #e74c3c;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        h2 { font-size: 1.2rem; color: #666; margin-bottom: 20px; }

        /* --- Menu Buttons --- */
        .category-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn-length { background-color: #FF9F1C; }
        .btn-volume { background-color: #2EC4B6; }
        .btn-mass { background-color: #E71D36; }
        .btn-symbols { background-color: #9b59b6; }
        .btn-random { background: linear-gradient(45deg, #4A90E2, #00C6FF); margin-top: 20px; }

        .category-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* --- Game Area --- */
        #game-screen, #result-screen, #review-screen { display: none; }

        .question-box {
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: bold;
        }
        
        .symbol-highlight {
            font-size: 2.5rem;
            color: var(--primary);
            display: block;
            margin: 10px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background-color: #eef2f5;
            border: 2px solid #cbd2d9;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option-btn:hover {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* --- The Lit Meter --- */
        .meter-wrapper {
            margin: 30px 0 10px 0;
            position: relative;
            padding-bottom: 20px;
        }

        .meter-bar {
            height: 25px;
            background: linear-gradient(90deg, #ffcc00 0%, #ff6b6b 50%, #9b59b6 100%);
            border-radius: 15px;
            width: 100%;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .meter-labels {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 15px solid #333;
            position: absolute;
            bottom: 20px;
            left: 0%;
            transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateX(-50%);
        }

        .pointer::after {
            content: "YOUR SCORE";
            position: absolute;
            top: 20px;
            left: -35px;
            width: 70px;
            font-size: 0.7rem;
            text-align: center;
            font-weight: bold;
        }

        /* --- Immediate Feedback Modal --- */
        #feedback-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .feedback-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #feedback-title { font-size: 2rem; margin: 0 0 10px 0; }
        #feedback-text { font-size: 1.2rem; margin-bottom: 25px; line-height: 1.5; color: #555;}
        
        .fb-correct { color: var(--correct); }
        .fb-wrong { color: var(--wrong); }

        /* --- Review Section --- */
        .review-item {
            background: #ffebeb;
            border-left: 5px solid #ff4d4d;
            padding: 10px;
            margin-bottom: 10px;
            text-align: left;
            border-radius: 4px;
        }
        .review-q { font-weight: bold; margin-bottom: 5px; }
        .review-a { color: #27ae60; font-weight: bold;}

        .nav-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 10px;
            font-weight: bold;
        }

        /* --- Share Link Box --- */
        .share-box {
            margin: 20px 0; 
            padding: 20px; 
            background: #e8f4fd; 
            border-radius: 10px; 
            border: 2px dashed #4A90E2;
        }
        
        .share-link {
            display: inline-block;
            text-decoration: none;
            color: white;
            background: #27ae60;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .share-link:hover { transform: scale(1.05); background: #219150; }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
        }

    </style>
</head>
<body>

<div id="feedback-overlay">
    <div class="feedback-content">
        <h2 id="feedback-title"></h2>
        <p id="feedback-text"></p>
        <button class="nav-btn" onclick="nextQuestion()">Next Question ➡️</button>
    </div>
</div>

<div class="container" id="menu-screen">
    <h1>📏 Measurement Master ⚖️</h1>
    <h2>Choose your challenge!</h2>
    <button class="category-btn btn-length" onclick="startGame('length')">Length 📏</button>
    <button class="category-btn btn-volume" onclick="startGame('volume')">Volume 🥛</button>
    <button class="category-btn btn-mass" onclick="startGame('mass')">Weight / Mass 🏋️</button>
    <button class="category-btn btn-symbols" onclick="startGame('symbols')">Unit Symbols 🔣 (in³, kg, L)</button>
    <button class="category-btn btn-random" onclick="startGame('random')">Random Mix 🎲</button>
</div>

<div class="container" id="game-screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#888;">
        <span id="q-progress">Question 1/20</span>
        <span id="q-category-label" style="font-size:0.8rem; font-weight:bold; background:#eee; padding:2px 8px; border-radius:4px;"></span>
    </div>

    <div class="question-box" id="question-text">Loading...</div>
    
    <div class="options-grid" id="options-container">
        </div>

    <div class="meter-wrapper">
        <div class="meter-bar"></div>
        <div class="pointer" id="lit-pointer"></div>
        <div class="meter-labels">
            <span>Trying...</span>
            <span>Good</span>
            <span>🔥 LIT 🔥</span>
        </div>
    </div>
</div>

<div class="container" id="result-screen">
    <h1>Game Over!</h1>
    <h2 id="final-score-text"></h2>
    <div id="emoji-feedback" style="font-size: 3rem; margin-bottom: 10px;"></div>
    
    <div class="share-box">
        <p style="margin:0 0 5px 0; font-weight:bold; color:#4A90E2; font-size:1.1rem;">📸 Show off your success!</p>
        <p style="font-size:0.9rem; margin-bottom:10px;">Take a screenshot of your score and upload it here:</p>
        <a href="https://tinyurl.com/sharelitscreen" target="_blank" class="share-link">Upload Screenshot 📤</a>
    </div>

    <button class="nav-btn" id="review-btn" onclick="showReview()">Review Wrong Answers</button>
    <br>
    <button class="nav-btn" style="background-color: #666;" onclick="location.reload()">Play Again</button>
</div>

<div class="container" id="review-screen">
    <h1>Review Time 🧐</h1>
    <div id="review-list" style="max-height: 300px; overflow-y: auto;"></div>
    <button class="nav-btn" onclick="location.reload()">Play Again</button>
</div>

<script>
    // --- Data ---
    const gameData = {
        length: [
            { unit: "1 millimeter", about: "the thickness of a dime" },
            { unit: "1 centimeter", about: "the width of a pinky finger" },
            { unit: "1 inch", about: "the length from tip of thumb to first knuckle" },
            { unit: "1 foot", about: "the length of a football" },
            { unit: "1 yard", about: "the length of a baseball bat" },
            { unit: "1 meter", about: "the length of a baseball bat and ball" },
            { unit: "1 kilometer", about: "the distance someone walks in 10 minutes" },
            { unit: "1 mile", about: "the distance someone runs in 10 minutes" }
        ],
        volume: [
            { unit: "1 milliliter", about: "the volume of an eyedropper" },
            { unit: "1 cup", about: "the volume of a school milk carton" },
            { unit: "1 quart", about: "the volume of a large bottle of sports drink" },
            { unit: "1 liter", about: "the volume of a reusable water bottle" },
            { unit: "1 gallon", about: "the volume of a large milk jug" }
        ],
        mass: [
            { unit: "1 gram", about: "the mass of a raisin" },
            { unit: "1 ounce", about: "the weight of a slice of bread" },
            { unit: "1 pound", about: "the weight of a loaf of bread" },
            { unit: "1 kilogram", about: "the mass of a textbook" },
            { unit: "1 ton", about: "the weight of a small car" }
        ],
        // Updated Symbols with Names (n) for better feedback
        symbols: [
            { s: "in³", t: "Volume", n: "Cubic Inches" },
            { s: "cm³", t: "Volume", n: "Cubic Centimeters" },
            { s: "liter", t: "Volume", n: "Liter" },
            { s: "mL", t: "Volume", n: "Milliliter" },
            { s: "gal", t: "Volume", n: "Gallon" },
            { s: "kg", t: "Weight / Mass", n: "Kilogram" },
            { s: "g", t: "Weight / Mass", n: "Gram" },
            { s: "lbs", t: "Weight / Mass", n: "Pounds" },
            { s: "oz", t: "Weight / Mass", n: "Ounce" },
            { s: "mg", t: "Weight / Mass", n: "Milligram" },
            { s: "cm", t: "Length", n: "Centimeter" },
            { s: "ft", t: "Length", n: "Foot" },
            { s: "mm", t: "Length", n: "Millimeter" },
            { s: "mi", t: "Length", n: "Mile" },
            { s: "km", t: "Length", n: "Kilometer" },
        ]
    };

    const symbolOptions = ["Length", "Volume", "Weight / Mass"];

    // --- Game State ---
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let wrongAnswers = [];
    const totalQuestions = 20;

    // --- Utilities ---
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateQuestionSet(category) {
        const questions = [];
        const keys = ['length', 'volume', 'mass', 'symbols'];

        for (let i = 0; i < totalQuestions; i++) {
            
            let selectedCatKey = category;
            if (category === 'random') {
                selectedCatKey = keys[Math.floor(Math.random() * keys.length)];
            }

            if (selectedCatKey === 'symbols') {
                // Symbol Logic
                const data = gameData.symbols;
                const item = data[Math.floor(Math.random() * data.length)];
                
                questions.push({
                    q: `What does this measure?<br><span class="symbol-highlight">${item.s}</span>`,
                    a: item.t,
                    options: symbolOptions,
                    catLabel: "SYMBOLS",
                    originalItem: item // Pass full item for explanation
                });

            } else {
                // Comparison Logic
                const sourceData = gameData[selectedCatKey];
                const correctFact = sourceData[Math.floor(Math.random() * sourceData.length)];
                const type = Math.random() > 0.5 ? 0 : 1;
                
                let questionText, correctAnswer, distractors;

                if (type === 0) {
                    questionText = `What is about ${correctFact.about}?`;
                    correctAnswer = correctFact.unit;
                    const others = sourceData.filter(d => d.unit !== correctFact.unit);
                    distractors = shuffleArray(others).slice(0, 3).map(d => d.unit);
                } else {
                    questionText = `${correctFact.unit} is about...`;
                    correctAnswer = correctFact.about;
                    const others = sourceData.filter(d => d.unit !== correctFact.unit);
                    distractors = shuffleArray(others).slice(0, 3).map(d => d.about);
                }

                let options = shuffleArray([...distractors, correctAnswer]);

                questions.push({
                    q: questionText,
                    a: correctAnswer,
                    options: options,
                    catLabel: selectedCatKey.toUpperCase(),
                    originalItem: correctFact // Pass full item for explanation
                });
            }
        }
        return questions;
    }

    // --- Game Logic ---
    function startGame(category) {
        currentQuestions = generateQuestionSet(category);
        currentQuestionIndex = 0;
        score = 0;
        wrongAnswers = [];
        
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        updateLitMeter();
        loadQuestion();
    }

    function loadQuestion() {
        // Reset check
        if (currentQuestionIndex >= totalQuestions) {
            endGame();
            return;
        }

        const qData = currentQuestions[currentQuestionIndex];
        document.getElementById('q-progress').innerText = `Question ${currentQuestionIndex + 1}/${totalQuestions}`;
        document.getElementById('q-category-label').innerText = qData.catLabel;
        document.getElementById('question-text').innerHTML = qData.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = ''; 

        // Adjust grid for symbols
        if(qData.catLabel === "SYMBOLS") {
             container.style.gridTemplateColumns = "1fr 1fr 1fr"; 
             if(window.innerWidth < 500) container.style.gridTemplateColumns = "1fr";
        } else {
             container.style.gridTemplateColumns = "1fr 1fr";
             if(window.innerWidth < 500) container.style.gridTemplateColumns = "1fr";
        }

        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(opt);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selected) {
        const currentQ = currentQuestions[currentQuestionIndex];
        const isCorrect = (selected === currentQ.a);
        
        // 1. Update Score Data
        if (isCorrect) {
            score++;
        } else {
            const cleanQ = currentQ.q.replace(/<[^>]*>/g, " ");
            wrongAnswers.push({
                question: cleanQ,
                correct: currentQ.a,
                youPicked: selected
            });
        }
        
        updateLitMeter();

        // 2. Generate Explanation Text
        let feedbackTitle = isCorrect ? "✅ Correct!" : "❌ Not quite!";
        let feedbackClass = isCorrect ? "fb-correct" : "fb-wrong";
        let explanation = "";

        if (currentQ.catLabel === "SYMBOLS") {
            const item = currentQ.originalItem;
            explanation = `<strong>${item.s}</strong> is the symbol for <strong>${item.n}</strong>.<br>It measures <strong>${item.t}</strong>.`;
        } else {
            const item = currentQ.originalItem;
            explanation = `Remember:<br><strong>${item.unit}</strong> is about <strong>${item.about}</strong>.`;
        }

        // 3. Show Overlay
        const titleEl = document.getElementById('feedback-title');
        titleEl.innerText = feedbackTitle;
        titleEl.className = feedbackClass; // Apply color
        
        document.getElementById('feedback-text').innerHTML = explanation;
        document.getElementById('feedback-overlay').style.display = 'flex';
    }

    function nextQuestion() {
        // Hide overlay and move to next
        document.getElementById('feedback-overlay').style.display = 'none';
        currentQuestionIndex++;
        loadQuestion();
    }

    function updateLitMeter() {
        const percentage = (score / totalQuestions) * 100;
        const safePercent = Math.min(Math.max(percentage, 0), 100);
        document.getElementById('lit-pointer').style.left = safePercent + '%';
    }

    function endGame() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        const finalPercent = (score / totalQuestions) * 100;
        document.getElementById('final-score-text').innerText = `You scored ${score} out of ${totalQuestions}`;
        
        const emojiDiv = document.getElementById('emoji-feedback');
        if (finalPercent === 100) emojiDiv.innerText = "🔥🔥 LIT! 🔥🔥";
        else if (finalPercent >= 80) emojiDiv.innerText = "🎉 Awesome! 🎉";
        else if (finalPercent >= 50) emojiDiv.innerText = "👍 Good Job!";
        else emojiDiv.innerText = "📚 Keep Practicing!";

        const reviewBtn = document.getElementById('review-btn');
        if (wrongAnswers.length === 0) {
            reviewBtn.style.display = 'none';
        } else {
            reviewBtn.style.display = 'inline-block';
        }
    }

    function showReview() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('review-screen').style.display = 'block';
        
        const list = document.getElementById('review-list');
        list.innerHTML = '';

        wrongAnswers.forEach(item => {
            const div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `
                <div class="review-q">Q: ${item.question}</div>
                <div>❌ You picked: ${item.youPicked}</div>
                <div class="review-a">✅ Correct: ${item.correct}</div>
            `;
            list.appendChild(div);
        });
    }

</script>

</body>
</html>
