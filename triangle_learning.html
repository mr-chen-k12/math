<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bases and Heights of Triangles - Interactive Learning</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady();
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary-color: #0284c7;
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --background-color: #f8fafc;
            --card-color: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            color: #0f172a;
            text-align: center;
            margin-top: 0;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }

        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 15px;
        }

        .interactive-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .problem-header {
            background-color: #0f766e;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .instruction-box {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background-color: #f0f9ff;
        }

        .option-btn.correct {
            border-color: var(--success-color);
            background-color: #f0fdf4;
            color: #166534;
            font-weight: bold;
        }

        .option-btn.wrong {
            border-color: var(--danger-color);
            background-color: #fef2f2;
            color: #991b1b;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: 500;
            display: none;
        }

        .feedback.success {
            display: block;
            background-color: #dcfce7;
            color: #166534;
        }

        .feedback.error {
            display: block;
            background-color: #fee2e2;
            color: #991b1b;
        }

        .action-container {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .primary-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .primary-button:hover {
            background-color: #0369a1;
        }

        .screenshot-btn {
            background-color: #8b5cf6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.3);
        }

        .screenshot-btn:hover {
            background-color: #7c3aed;
        }

        canvas {
            background: white;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
            max-width: 100%;
        }

        .score-title {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #475569;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bases and Heights of Triangles</h1>
    
    <div class="layout-grid">
        <div class="visual-panel">
            <canvas id="triangleCanvas" width="360" height="200"></canvas>
            
            <div class="score-title">Your Achievement Meter</div>
            <canvas id="scoreCanvas" width="360" height="140"></canvas>
        </div>

        <div class="interactive-panel">
            <div>
                <div id="problemHeader" class="problem-header">Triangle B</div>
                <div id="instructionBox" class="instruction-box">
                    Loading problem details...
                </div>
                <div id="optionsContainer" class="options-container">
                    </div>
                <div id="feedbackBox" class="feedback"></div>
            </div>

            <div class="action-container">
                <span id="stepIndicator" style="font-weight: 500; color: #64748b;">Step 1 of 3</span>
                <button id="nextBtn" class="primary-button" style="display: none;">Next Step &rarr;</button>
            </div>
        </div>
    </div>

    <button id="screenshotBtn" class="screenshot-btn">📸 Print Screen / Submit Success!</button>
</div>

<script>
    // System State Variables
    let currentProblemIdx = 0;
    let currentStepIdx = 0; 
    let currentScore = 0;
    let optionSelected = false;

    // Problems Data Configuration
    const problems = [
        {
            name: "Triangle B",
            areaText: "8\\text{ square units}",
            baseText: "b",
            heightText: "\\frac{8}{3}",
            drawType: "B",
            steps: [
                {
                    // Level 1: Find substitution/unknown
                    instruction: "The formula for the area of a triangle is $A = \\frac{1}{2} \\cdot b \\cdot h$. Given that the area is $8$ and the height is $\\frac{8}{3}$, what is our <strong>unknown variable</strong> that we need to find?",
                    options: [
                        { text: "Area ($A$)", correct: false },
                        { text: "Base ($b$)", correct: true },
                        { text: "Height ($h$)", correct: false }
                    ],
                    hint: "Correct! We are missing the length of the horizontal bottom side, which represents the base ($b$)."
                },
                {
                    // Level 2: Simplify equation
                    instruction: "Let's substitute our known values into the area formula:<br>$$8 = \\frac{1}{2} \\cdot b \\cdot \\frac{8}{3}$$<br>To find the next step, simplify the numbers on the right side: $\\frac{1}{2} \\cdot \\frac{8}{3}$. What is the simplified equation?",
                    options: [
                        { text: "$8 = \\frac{8}{5}b$", correct: false },
                        { text: "$8 = \\frac{4}{3}b$", correct: true },
                        { text: "$8 = 4b$", correct: false }
                    ],
                    hint: "Spot on! $\\frac{1}{2} \\cdot \\frac{8}{3} = \\frac{8}{6}$, which simplifies directly to $\\frac{4}{3}$. So our equation becomes $8 = \\frac{4}{3}b$."
                },
                {
                    // Level 3: Solve
                    instruction: "Excellent! Now let's isolate $b$ to solve the equation:<br>$$8 = \\frac{4}{3}b$$<br>Multiply both sides by the reciprocal $\\frac{3}{4}$ to clear the fraction. What is the final value of $b$?",
                    options: [
                        { text: "$b = 6$", correct: true },
                        { text: "$b = 3$", correct: false },
                        { text: "$b = 8$", correct: false }
                    ],
                    hint: "Fantastic! $8 \\cdot \\frac{3}{4} = \\frac{24}{4} = 6$. The base length $b$ is equal to 6 units!"
                }
            ]
        },
        {
            name: "Triangle C",
            areaText: "\\frac{54}{5}\\text{ square units}",
            baseText: "3\\frac{3}{5} = \\frac{18}{5}",
            heightText: "h",
            drawType: "C",
            steps: [
                {
                    // Level 1: Find substitution/unknown
                    instruction: "Now look at Triangle C. The area is $\\frac{54}{5}$ square units and the base is $3\\frac{3}{5}$ (which turns into improper fraction $\\frac{18}{5}$). What is our <strong>unknown variable</strong> here?",
                    options: [
                        { text: "Area ($A$)", correct: false },
                        { text: "Base ($b$)", correct: false },
                        { text: "Height ($h$)", correct: true }
                    ],
                    hint: "Perfect! The vertical dashed line shows the height $h$ is outside the obtuse triangle, which is our unknown."
                },
                {
                    // Level 2: Simplify equation
                    instruction: "Let's substitute our values into the formula:<br>$$\\frac{54}{5} = \\frac{1}{2} \\cdot \\frac{18}{5} \\cdot h$$<br>Simplify the multiplication on the right side: $\\frac{1}{2} \\cdot \\frac{18}{5}$. What is the clean next step?",
                    options: [
                        { text: "$$\\frac{54}{5} = \\frac{9}{5}h$$", correct: true },
                        { text: "$$\\frac{54}{5} = \\frac{18}{10}h$$", correct: false },
                        { text: "$$\\frac{54}{5} = \\frac{19}{7}h$$", correct: false }
                    ],
                    hint: "Brilliant! Half of $\\frac{18}{5}$ is exactly $\\frac{9}{5}$. So, $\\frac{54}{5} = \\frac{9}{5}h$."
                },
                {
                    // Level 3: Solve
                    instruction: "Final stretch! We have:<br>$$\\frac{54}{5} = \\frac{9}{5}h$$<br>Since the denominators are both 5, you can simply compare the numerators ($54 = 9h$) or multiply by $\\frac{5}{9}$. What is the value of $h$?",
                    options: [
                        { text: "$h = 54$", correct: false },
                        { text: "$h = 9$", correct: false },
                        { text: "$h = 6$", correct: true }
                    ],
                    hint: "Incredible job! $54 \\div 9 = 6$. The missing height $h$ is 6 units!"
                }
            ]
        }
    ];

    // Canvas rendering elements
    const triangleCanvas = document.getElementById("triangleCanvas");
    const tCtx = triangleCanvas.getContext("2d");
    const scoreCanvas = document.getElementById("scoreCanvas");
    const sCtx = scoreCanvas.getContext("2d");

    // Initialize the View
    function initApp() {
        loadStep();
        drawScoreboard();
        
        // Print Screen Button listener
        document.getElementById("screenshotBtn").addEventListener("click", () => {
            window.open("https://tinyurl.com/mathscreenshot", "_blank");
        });

        document.getElementById("nextBtn").addEventListener("click", () => {
            goToNext();
        });
    }

    // Load current step data
    function loadStep() {
        optionSelected = false;
        const problem = problems[currentProblemIdx];
        const step = problem.steps[currentStepIdx];

        // Update headers & text
        document.getElementById("problemHeader").innerText = `${problem.name} (Step ${currentStepIdx + 1}/3)`;
        document.getElementById("instructionBox").innerHTML = step.instruction;
        document.getElementById("stepIndicator").innerText = `Problem ${currentProblemIdx + 1} of 2 — Step ${currentStepIdx + 1} of 3`;
        
        // Clear feedback & Hide next button
        const feedbackBox = document.getElementById("feedbackBox");
        feedbackBox.className = "feedback";
        feedbackBox.style.display = "none";
        document.getElementById("nextBtn").style.display = "none";

        // Build option buttons
        const container = document.getElementById("optionsContainer");
        container.innerHTML = "";
        
        step.options.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = opt.text;
            btn.addEventListener("click", () => handleOptionClick(btn, opt, step.hint));
            container.appendChild(btn);
        });

        // Trigger MathJax processing
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }

        // Draw geometric graphic
        drawTriangleGraphic(problem.drawType);
    }

    // Handle Option Selection
    function handleOptionClick(selectedBtn, option, hintText) {
        if (optionSelected) return; // Freeze selections once clicked
        
        const feedbackBox = document.getElementById("feedbackBox");
        const allButtons = document.querySelectorAll(".option-btn");
        
        if (option.correct) {
            selectedBtn.classList.add("correct");
            feedbackBox.innerHTML = `<strong>Correct!</strong> ${hintText}`;
            feedbackBox.className = "feedback success";
            
            // Increment score smoothly
            currentScore += 16.66; 
            if (currentScore > 100) currentScore = 100;
            drawScoreboard();
            
            optionSelected = true;
            document.getElementById("nextBtn").style.display = "block";
        } else {
            selectedBtn.classList.add("wrong");
            selectedBtn.disabled = true;
            feedbackBox.innerHTML = `<strong>Not quite!</strong> Try looking at the formula adjustments or simplify again.`;
            feedbackBox.className = "feedback error";
            
            // Small score penalty for minor slip ups to keep it interactive
            currentScore -= 4;
            if (currentScore < 0) currentScore = 0;
            drawScoreboard();
        }

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }
    }

    // Navigation logic
    function goToNext() {
        currentStepIdx++;
        if (currentStepIdx >= 3) {
            currentStepIdx = 0;
            currentProblemIdx++;
        }

        if (currentProblemIdx >= problems.length) {
            // Completed everything
            currentScore = 100;
            drawScoreboard();
            document.getElementById("problemHeader").innerText = "🎉 All Levels Completed!";
            document.getElementById("instructionBox").innerHTML = "Amazing work! You've successfully navigated the substitution, simplification, and evaluation of triangle geometric parameters. Click below to submit your success snapshot!";
            document.getElementById("optionsContainer").innerHTML = "";
            document.getElementById("nextBtn").style.display = "none";
            document.getElementById("stepIndicator").innerText = "Finished!";
        } else {
            loadStep();
        }
    }

    // Dynamic Geometry Canvas Rendering
    function drawTriangleGraphic(type) {
        tCtx.clearRect(0, 0, triangleCanvas.width, triangleCanvas.height);
        tCtx.lineWidth = 2;
        tCtx.strokeStyle = "#334155";
        
        if (type === "B") {
            // Triangle B Layout (Acute/Right-ish Height alignment)
            const p1 = { x: 70, y: 160 };
            const p2 = { x: 310, y: 160 };
            const hTop = { x: 130, y: 40 };
            const hBot = { x: 130, y: 160 };

            // Draw Triangle B
            tCtx.beginPath();
            tCtx.moveTo(p1.x, p1.y);
            tCtx.lineTo(hTop.x, hTop.y);
            tCtx.lineTo(p2.x, p2.y);
            tCtx.closePath();
            tCtx.fillStyle = "#e0f2fe";
            tCtx.fill();
            tCtx.stroke();

            // Height Line
            tCtx.beginPath();
            tCtx.setLineDash([4, 4]);
            tCtx.moveTo(hTop.x, hTop.y);
            tCtx.lineTo(hBot.x, hBot.y);
            tCtx.stroke();
            tCtx.setLineDash([]);

            // Right Angle Box
            tCtx.strokeRect(hBot.x, hBot.y - 10, 10, 10);

            // Labels
            tCtx.fillStyle = "#0f172a";
            tCtx.font = "bold 16px sans-serif";
            tCtx.fillText("B", 170, 110);
            
            tCtx.font = "14px sans-serif";
            tCtx.fillText("height = 8/3", 145, 90);
            
            // Base dimension arrow lines
            tCtx.beginPath();
            tCtx.moveTo(70, 185);
            tCtx.lineTo(310, 185);
            tCtx.stroke();
            tCtx.fillText("base = b", 165, 180);
        } else {
            // Triangle C Layout (Obtuse with exterior height)
            const p1 = { x: 160, y: 160 };
            const p2 = { x: 270, y: 60 };
            const p3 = { x: 200, y: 60 };
            const extHBot = { x: 130, y: 160 };
            const extHTop = { x: 130, y: 60 };

            // Draw Triangle C
            tCtx.beginPath();
            tCtx.moveTo(p1.x, p1.y);
            tCtx.lineTo(p3.x, p3.y);
            tCtx.lineTo(p2.x, p2.y);
            tCtx.closePath();
            tCtx.fillStyle = "#fef3c7";
            tCtx.fill();
            tCtx.stroke();

            // Exterior extension lines
            tCtx.beginPath();
            tCtx.setLineDash([4, 4]);
            // Height vertical line
            tCtx.moveTo(extHBot.x, extHBot.y);
            tCtx.lineTo(p1.x, p1.y);
            tCtx.moveTo(extHBot.x, extHBot.y);
            tCtx.lineTo(extHTop.x, extHTop.y);
            // Top ceiling projection
            tCtx.moveTo(extHTop.x, extHTop.y);
            tCtx.lineTo(p3.x, p3.y);
            tCtx.stroke();
            tCtx.setLineDash([]);

            // Right angle indicator
            tCtx.strokeRect(extHTop.x, extHTop.y, 10, 10);

            // Labels
            tCtx.fillStyle = "#0f172a";
            tCtx.font = "bold 16px sans-serif";
            tCtx.fillText("C", 200, 110);
            
            tCtx.font = "14px sans-serif";
            tCtx.fillText("h", 115, 115);
            tCtx.fillText("base = 3 3/5", 210, 50);
        }
    }

    // Gauge Scoreboard Rendering 
    function drawScoreboard() {
        sCtx.clearRect(0, 0, scoreCanvas.width, scoreCanvas.height);
        
        const centerX = scoreCanvas.width / 2;
        const centerY = scoreCanvas.height - 20;
        const radius = 90;

        // Draw basic background arc track
        sCtx.lineWidth = 20;
        sCtx.lineCap = "butt";

        // Segment 1: Trying (Red-Orange)
        sCtx.beginPath();
        sCtx.strokeStyle = "#f87171";
        sCtx.arc(centerX, centerY, radius, Math.PI, Math.PI + (Math.PI / 3));
        sCtx.stroke();

        // Segment 2: Good Effort (Yellow-Blue)
        sCtx.beginPath();
        sCtx.strokeStyle = "#fbbf24";
        sCtx.arc(centerX, centerY, radius, Math.PI + (Math.PI / 3), Math.PI + (2 * Math.PI / 3));
        sCtx.stroke();

        // Segment 3: Lit! (Green)
        sCtx.beginPath();
        sCtx.strokeStyle = "#4ade80";
        sCtx.arc(centerX, centerY, radius, Math.PI + (2 * Math.PI / 3), 2 * Math.PI);
        sCtx.stroke();

        // Text Labels on Gauge segments
        sCtx.fillStyle = "#64748b";
        sCtx.font = "bold 12px sans-serif";
        sCtx.fillText("Trying", centerX - 85, centerY - 45);
        sCtx.fillText("Good Effort", centerX - 35, centerY - 100);
        sCtx.fillText("Lit! 🔥", centerX + 45, centerY - 45);

        // Compute Needle Angle based on Score (0 to 100 mapped to PI to 2*PI)
        const scoreRatio = currentScore / 100;
        const needleAngle = Math.PI + (scoreRatio * Math.PI);

        // Draw Pointer Triangle Needle
        sCtx.save();
        sCtx.translate(centerX, centerY);
        sCtx.rotate(needleAngle);
        
        sCtx.beginPath();
        sCtx.fillStyle = "#1e293b";
        sCtx.moveTo(0, -5);
        sCtx.lineTo(radius - 15, 0);
        sCtx.lineTo(0, 5);
        sCtx.closePath();
        sCtx.fill();
        sCtx.restore();

        // Center Pin anchor point
        sCtx.beginPath();
        sCtx.arc(centerX, centerY, 8, 0, 2 * Math.PI);
        sCtx.fillStyle = "#0f172a";
        sCtx.fill();

        // Score Text Value
        sCtx.fillStyle = "#1e293b";
        sCtx.font = "bold 16px sans-serif";
        sCtx.textAlign = "center";
        sCtx.fillText(`Rating: ${Math.round(currentScore)}%`, centerX, centerY + 15);
    }

    // Run initializer when everything parses
    window.onload = initApp;
</script>

</body>
</html>
